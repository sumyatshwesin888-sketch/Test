<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">
    <title>Monthly Report</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="expense.css">
</head>
<body class="report-body">
    <div class="container py-5">
        <!-- Report Hero -->
        <div class="report-hero mb-5">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                <div>
                    <h1>
                        Monthly Report 📊
                    </h1>
                    <p>
                        Your complete financial overview
                    </p>
                </div>
                <a href="MyProject.html"
                    class="back-btn">
                    <i class="bi bi-arrow-left"></i>
                    Back To Home
                </a>
            </div>
        </div>
        <!-- Summary Cards -->
        <div class="row g-4 mb-5">
            <div class="col-lg-4 col-md-6">
                <div class="report-summary income-report">
                    <div>
                        <p>Monthly Income</p>
                        <h2 id="monthlyIncome">
                            0 Ks
                        </h2>
                    </div>
                    <div class="report-icon income-report-icon">
                        <i class="bi bi-graph-up-arrow"></i>
                    </div>
                </div>
            </div>
            <div class="col-lg-4 col-md-6">
                <div class="report-summary expense-report">
                    <div>
                        <p>Monthly Expense</p>
                        <h2 id="monthlyExpense">
                            0 Ks
                        </h2>
                    </div>
                    <div class="report-icon expense-report-icon">
                        <i class="bi bi-graph-down-arrow"></i>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="report-summary balance-report">
                    <div>
                        <p>Total Savings</p>
                        <h2 id="monthlyBalance">
                            0 Ks
                        </h2>
                    </div>
                    <div class="report-icon balance-report-icon">
                        <i class="bi bi-piggy-bank-fill"></i>
                    </div>
                </div>
            </div>
        </div>
        <!-- Transaction Table -->
        <div class="report-table-card">
            <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                <h3>
                    Monthly Transactions
                </h3>
                <span class="report-badge">
                    Financial Activity
                </span>
            </div>
            <div class="table-responsive">
               <table class="custom-table align-middle">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Amount</th>
                            <th>Type</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="reportList"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="report.js"></script>
</body>
</html>
