<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker Pro</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
   
    <link rel="stylesheet" href="expense.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg custom-navbar">
        <div class="container">
            <a class="navbar-brand logo" href="#">
                <i class="bi bi-wallet2"></i>
                Expense Tracker
            </a>
            <a href="report.html" class="btn report-btn">
                <i class="bi bi-bar-chart-fill"></i>
                Monthly Report
            </a>
        </div>
    </nav>
    <div class="container py-5">
        <!-- Hero -->
        <div class="hero-section mb-5">
            <div>
                <h1>
                    Track Your Money
                    Smarter 💸
                </h1>
                <p> Plan your expenses today for a stress-free tomorrow</p>
            </div>
        </div>
        <!-- Summary -->
        <div class="row g-4 mb-5">
            <div class="col-lg-4 col-md-6">
                <div class="summary-card">
                    <div>
                        <p>Total Income</p>
                        <h2 id="income">0 Ks</h2>
                    </div>
                    <div class="summary-icon income-icon">
                        <i class="bi bi-wallet2"></i>
                    </div>
                </div>
            </div>
            <div class="col-lg-4 col-md-6">
                <div class="summary-card">
                    <div>
                        <p>total Expense</p>
                        <h2 id="expense">0 Ks</h2>
                    </div>
                    <div class="summary-icon expense-icon">
                        <i class="bi bi-cash-stack"></i>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="summary-card">
                    <div>
                        <p>Balance</p>
                        <h2 id="balance"> 0 Ks </h2>
                    </div>
                    <div class="summary-icon balance-icon">
                        <i class="bi bi-wallet-fill"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="glass-card p-4 mb-5">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3>Add Transaction</h3>
                <span class="live-date" id="todayDate"></span>
            </div>
            <div class="row g-3">
                <div class="col-lg-4">
                    <input type="text" id="title" class="form-control custom-input" placeholder="Transaction Title">
                </div>
                <div class="col-lg-3">
                    <input type="number" id="amount" class="form-control custom-input" placeholder="Amount">
                </div>
                <div class="col-lg-3">
                    <select id="type" class="form-select custom-input">
                        <option value="income"> Income </option>
                        <option value="expense"> Expense </option>
                    </select>
                </div>
                <div class="col-lg-2 d-grid">
                    <button id="addBtn" class="btn add-btn">Add</button>
                </div>
            </div>
        </div>
        <div>
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3>Transaction History</h3>
                <span class="history-text">Latest Activity</span>
            </div>
            <div id="list"></div>
        </div>
    </div>
    <script src="expense.js"></script>
</body>
</html>
